spring.application.name=backend
server.port=${PORT:8080}

# --- Security: cap HTTP request body size at the servlet level ---
spring.servlet.multipart.max-request-size=16KB
spring.servlet.multipart.max-file-size=16KB
server.tomcat.max-http-form-post-size=16KB

# --- CORS: production origin (override via env var CORS_ALLOWED_ORIGINS for other envs) ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://compilervisualizer.vercel.app}
